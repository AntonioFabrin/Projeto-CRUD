<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Painel de Atendimentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="styles.css">

</head>

<body class="container mt-5">

<div class="header-bar">
<h1>Painel de Atendimentos</h1>
</div>

<div class="row">

<div class="col-md-4">

<div class="card p-4">

<h5 class="mb-3">Novo Atendimento</h5>

<form id="form">

<div class="mb-3">
<input class="form-control" id="cliente" placeholder="Nome do cliente" required>
</div>

<div class="mb-3">
<input class="form-control" id="servico" placeholder="Serviço realizado" required>
</div>

<button class="btn btn-primary w-100">
Cadastrar
</button>

</form>

</div>

</div>

<div class="col-md-8">

<div class="card p-4">

<h5 class="mb-3">Lista de Atendimentos</h5>

<table class="table">

<thead>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Serviço</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
